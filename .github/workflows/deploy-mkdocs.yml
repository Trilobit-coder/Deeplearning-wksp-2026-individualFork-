name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'web/**'  # Only run if files in the web folder change

# Future-proofs the runner for the June 2026 Node.js transition
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

# Prevents multiple deployments from running at the same time
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.11'

      - name: Build site with uv
        working-directory: ./web
        # 'uv run' creates a temporary environment to avoid "externally managed" errors
        run: |
          uv run --with mkdocs-material --with mkdocs-minify-plugin \
          mkdocs build --site-dir ../site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Points to the 'site' folder created in the step above
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
